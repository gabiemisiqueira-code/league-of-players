
<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jogador - League of Players</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header>
    <h1>League of Players</h1>
    <nav>
      <a href="/ranking">Home</a>
      <a href="/champions">Campeões</a>
      <a href="/player">Jogador</a>
      <a href="/compare">Comparar</a>
      <a href="/guides">Guias</a>
      <a href="/pro">Pro Players</a>
    </nav>
  </header>

  <section class="hero" style="
    background:
    linear-gradient(rgba(5, 10, 20, 0.6), rgba(5, 10, 20, 0.85)),
    url('/img/banner.jpg') center/cover no-repeat;
  ">
    <div class="hero-content">
      <div class="badge">Perfil do jogador</div>
      <h2>Dados e desempenho</h2>
      <p>Busca simples por nome via URL.</p>
    </div>
  </section>

  <main class="container">
    <section class="reveal">
      <h2 class="section-title">Perfil do Jogador</h2>

      <div class="highlight-row">
        <div class="feature-box">
          <img src="/img/banner.jpg" alt="Jogador">
          <div class="text">
            <h3 id="playerName">Carregando...</h3>
            <p id="playerInfo">Buscando informações do jogador...</p>
          </div>
        </div>

        <div class="side-box">
          <img src="https://ddragon.leagueoflegends.com/cdn/img/champion/splash/Ahri_0.jpg" alt="Campeão favorito">
          <div class="text">
            <h3>Campeão Favorito</h3>
            <p>Área pronta para depois receber dados reais.</p>
          </div>
        </div>
      </div>
    </section>
  </main>

  <footer>
    League of Players © 2026
  </footer>

  <script src="/player.js"></script>
  <script src="/animations.js"></script>
</body>
</html>
