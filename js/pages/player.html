<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Jogador | League of Players</title>
  <link rel="stylesheet" href="../style.css">
</head>

<body class="dashboard-body">

<header class="navbar">
  <div class="logo">League of Players</div>
  <nav>
    <a href="../index.html">Início</a>
    <a href="../login.html">Login</a>
    <a href="../dashboard.html">Dashboard</a>
  </nav>
</header>

<main class="dashboard">

  <h1>Buscar Jogador</h1>

  <div style="margin: 30px;">
    <input 
      type="text" 
      id="playerSearchInput" 
      placeholder="Digite Nome#TAG (ex: Faker#KR1)"
      style="padding: 10px; width: 250px;"
    >

    <button 
      id="playerSearchBtn"
      style="padding: 10px;"
    >
      Buscar
    </button>
  </div>

  <p id="playerSearchHint"></p>

  <hr style="margin: 40px;">

  <h2>Resultado</h2>

  <p><strong>Nome:</strong> <span id="playerName">--</span></p>
  <p><strong>Nível:</strong> <span id="playerLevel">--</span></p>
  <p><strong>ID:</strong> <span id="playerId">--</span></p>

</main>

<script src="../js/player.js"></script>

</body>
</html>
