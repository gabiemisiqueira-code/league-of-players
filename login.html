<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | League of Players</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="login-body">
  <div class="bg-glow bg-glow-1"></div>
  <div class="bg-glow bg-glow-2"></div>

  <div class="login-container">
    <h1>League of Players</h1>
    <p>Entre para acompanhar estatísticas e recursos futuros</p>

    <form id="loginForm">
      <input type="text" id="nickname" placeholder="Seu nick" required />
      <input type="email" id="email" placeholder="Seu e-mail" required />
      <button type="submit" class="btn-primary">Entrar</button>
    </form>

    <a href="index.html" class="back-link">Voltar ao início</a>
  </div>

  <script src="js/script.js"></script>
</body>
</html>
